<script>
  if (Auth.isLoggedIn()) window.location.href = "dashboard.html";

  let selectedRole = "user";

  function selectRole(role) {
    selectedRole = role;
    document.getElementById("roleUser").classList.toggle("active", role === "user");
    document.getElementById("roleAdmin").classList.toggle("active", role === "admin");
    document.getElementById("companyGroup").style.display = role === "admin" ? "block" : "none";
  }

  function checkStrength(val) {
    const bar = document.getElementById("strengthBar");
    if (!val) { bar.className = "password-strength"; return; }
    const strong = /(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}/.test(val);
    const medium = /(?=.*[a-zA-Z])(?=.*\d).{6,}/.test(val);
    bar.className = "password-strength " + (strong ? "strength-strong" : medium ? "strength-medium" : "strength-weak");
  }

  async function doRegister() {
    const name     = document.getElementById("regName").value.trim();
    const email    = document.getElementById("regEmail").value.trim().toLowerCase();
    const password = document.getElementById("regPassword").value;
    const confirm  = document.getElementById("regConfirm").value;
    const company  = document.getElementById("regCompany").value.trim();

    }
