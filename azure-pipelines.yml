trigger:
- main

# ✅ Use your self-hosted agent
pool:
  name: Default

variables:
  azureServiceConnectionId: 'Azure-Conn'   # make sure this is correct
  functionAppName: 'sc-ticket-backend'

  # ✅ IMPORTANT: correct folder path from your repo
  workingDirectory: '$(System.DefaultWorkingDirectory)/ticket-booking-project/backend'

steps:

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.x'
  displayName: 'Use Python'

- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  workingDirectory: $(workingDirectory)
  displayName: 'Install dependencies'

- task: ArchiveFiles@2
  displayName: 'Archive project'
  inputs:
    rootFolderOrFile: '$(workingDirectory)'
    includeRootFolder: false
    archiveType: zip
    archiveFile: '$(Build.ArtifactStagingDirectory)/functionapp.zip'
    replaceExistingArchive: true

- task: AzureFunctionApp@1
  displayName: 'Deploy to Azure Function'
  inputs:
    azureSubscription: '$(azureServiceConnectionId)'
    appType: 'functionAppLinux'
    appName: '$(functionAppName)'
    package: '$(Build.ArtifactStagingDirectory)/functionapp.zip'